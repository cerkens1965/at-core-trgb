name: Build PlatformIO

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "src/**"
      - "examples/**"
      - ".github/workflows/pio.yml"
      - "platformio.ini"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          # AT-CORE firmware (principal)
          - examples/at_core_debug
          # Exemples board standard
          - examples/AdjustBacklight
          - examples/BatteryVoltage
          - examples/lv_benchmark
          - examples/lv_factory
          - examples/lv_helloworld
          - examples/lv_gif
          - examples/lv_images
          - examples/lv_music
          - examples/lv_qrcode
          - examples/lv_slider
          - examples/RGBPanel
          - examples/DeepSleep

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build
        run: pio run
        env:
          PLATFORMIO_SRC_DIR: ${{ matrix.example }}
