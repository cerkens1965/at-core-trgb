name: Build AT-VIEW (PlatformIO)

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "src/**"
      - "examples/at_core_debug/**"
      - ".github/workflows/pio.yml"
      - "platformio.ini"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build at_core_debug
        run: pio run -e T-RGB
        env:
          PLATFORMIO_SRC_DIR: ${{ github.workspace }}/examples/at_core_debug
